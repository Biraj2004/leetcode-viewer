<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leetcode Viewer Auth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      min-height: 200px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #313244;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: #ffa116;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 10px;
      color: #1e1e2e;
    }

    h1 { font-size: 14px; font-weight: 700; color: #cdd6f4; }
    p.sub { font-size: 11px; color: #6c7086; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-row.ok  { background: rgba(166,227,161,0.1); border: 1px solid rgba(166,227,161,0.3); }
    .status-row.bad { background: rgba(243,139,168,0.1); border: 1px solid rgba(243,139,168,0.3); }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #a6e3a1; }
    .dot.red   { background: #f38ba8; }

    .status-text { font-size: 12px; }

    button {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
      margin-bottom: 8px;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: #ffa116; color: #1e1e2e; }
    .btn-danger  { background: rgba(243,139,168,0.15); color: #f38ba8; border: 1px solid rgba(243,139,168,0.3); }
    .btn-danger:hover:not(:disabled) { background: rgba(243,139,168,0.25); }

    #msg {
      font-size: 11px;
      color: #89b4fa;
      text-align: center;
      min-height: 16px;
      margin-top: 4px;
    }
    #msg.error { color: #f38ba8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">LV</div>
    <div>
      <h1>LV Authenticator</h1>
      <p class="sub">Leetcode Viewer Extension</p>
    </div>
  </div>

  <div id="status-row" class="status-row bad">
    <div id="status-dot" class="dot red"></div>
    <span id="status-text" class="status-text">Checking token status…</span>
  </div>

  <button id="fetch-btn" class="btn-primary" disabled>Auto-Fetch Tokens</button>
  <button id="clear-btn" class="btn-danger" disabled>Clear Tokens</button>

  <div id="msg"></div>

  <script src="popup.js"></script>
</body>
</html>
